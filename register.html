<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
    }

    .register-container{
      width:400px;
      background:#fff;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .register-container h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
      font-size:30px;
    }

    .input-box{
      margin-bottom:18px;
    }

    .input-box label{
      display:block;
      margin-bottom:8px;
      color:#555;
      font-weight:bold;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#2575fc;
      box-shadow:0 0 8px rgba(37,117,252,0.4);
    }

    .register-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2575fc;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .register-btn:hover{
      background:#125de6;
    }

    .login-link{
      text-align:center;
      margin-top:15px;
      font-size:14px;
    }

    .login-link a{
      text-decoration:none;
      color:#2575fc;
      font-weight:bold;
    }

    .login-link a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <h2>Create Account</h2>

    <form>
      <div class="input-box">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>

      <div class="input-box">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Create password" required>
      </div>

      <div class="input-box">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>
      </div>

      <button type="submit" class="register-btn">Register</button>

      <div class="login-link">
        Already have an account?
        <a href="#">Login</a>
      </div>
    </form>
  </div>

</body>
</html>
